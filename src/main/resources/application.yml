server:
  port: ${SERVER_PORT:8084}

spring:
  application:
    name: ticket-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5433/${DB_NAME:ticketdb}
    username: ${DB_USER:vivaeventos}
    password: ${DB_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    listener:
      ack-mode: record
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      retries: 3
      acks: all
    consumer:
      group-id: ticket-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.vivaeventos.*"
        # Ignorar el header __TypeId__ del productor y usar siempre nuestro DTO local
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.vivaeventos.ticketservice.event.PagoConfirmadoEvent

# Configuración QR
ticket:
  qr:
    size: 300          # px
    format: PNG
    error-correction: H  # Alta redundancia para lectura en campo (RQ-05)

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    com.vivaeventos.ticketservice: INFO

kafka:
  topics:
    order-confirmed: order.confirmed   # Escucha
    ticket-generated: ticket.generated  # Publica
    ticket-validated: ticket.validated  # Publica